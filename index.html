<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kedrix One</title>
  <meta name="theme-color" content="#111A23" />
  <meta name="description" content="Kedrix One - Operational workspace." />
  <link rel="icon" href="./favicon.ico" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="./brand/kedrix-one-mark.svg" alt="Kedrix One" class="brand-logo" />
        <div>
          <div id="brandCompany" class="brand-company">Kedrix</div>
          <div id="brandProduct" class="brand-product">Kedrix One</div>
          <div id="brandSubtitle" class="brand-subtitle">Operational Workspace</div>
        </div>
      </div>

      <nav id="sidebarNav" class="nav-grid" aria-label="Moduli Kedrix One"></nav>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <div id="pageEyebrow" class="eyebrow">Kedrix One</div>
          <h1 id="pageTitle" class="page-title">Dashboard</h1>
        </div>

        <div class="topbar-actions">
          <button id="saveBackupButton" class="btn secondary" type="button" data-action="save-backup">Salva backup locale</button>
          <button id="newPracticeButton" class="btn" type="button" data-route-action="practices">Nuova pratica</button>
        </div>
      </header>

      <section id="mainContent" class="main-content" tabindex="-1" aria-live="polite"></section>
    </main>
  </div>

  <section id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></section>

  <script src="./js/storage.js"></script>
  <script src="./js/data/ports.js"></script>
  <script src="./js/data/customs.js"></script>
  <script src="./js/data/taric.js"></script>
  <script src="./js/data/goods-master.js"></script>
  <script src="./js/data/transport-units.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/ui/app-feedback.js"></script>
  <script src="./js/wisemind.js"></script>
  <script src="./js/i18n.js"></script>
  <script src="./js/practice-schemas.js"></script>
  <script src="./js/practices/sea-schema-cleanup.js"></script>
  <script src="./js/practices/reference-normalizer.js"></script>
  <script src="./js/practices/verification.js"></script>
  <script src="./js/practices/draft-validator.js"></script>
  <script src="./js/practices/form-layout.js"></script>
  <script src="./js/master-data/quick-add.js"></script>
  <script src="./js/practices/form-renderer.js"></script>
  <script src="./js/practices/open-edit.js"></script>
  <script src="./js/practices/identity.js"></script>
  <script src="./js/workspace/practice-workspace.js"></script>
  <script src="./js/practices/persistence.js"></script>
  <script src="./js/practices/save-pipeline.js"></script>
  <script src="./js/practices/container-integrity.js"></script>
  <script src="./js/practices/weight-integrity.js"></script>
  <script src="./js/documents/document-categories.js"></script>
  <script src="./js/documents/document-metadata.js"></script>
  <script src="./js/practices/attachments.js"></script>
  <script src="./js/practices/duplicate.js"></script>
  <script src="./js/documents/document-engine.js"></script>
  <script src="./js/documents/document-preview.js"></script>
  <script src="./js/search/practice-search-ui.js"></script>
  <script src="./js/search/practice-document-bridge.js"></script>
  <script src="./js/module-registry.js"></script>
  <script src="./js/licensing.js"></script>
  <script src="./js/templates.js"></script>
  <script src="./js/search-index.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
