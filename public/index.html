<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LogiWise | Kedrix</title>
  <meta name="description" content="LogiWise by Kedrix - Logistics operating platform prototype." />
  <meta name="theme-color" content="#111A23" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="../brand/kedrix.svg" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar" aria-label="Navigazione principale">
      <div class="sidebar-brand">
        <div class="brand-stack">
          <img src="../brand/kedrix.svg" alt="Kedrix" class="brand-kedrix" width="42" height="42" />
          <div class="brand-divider" aria-hidden="true"></div>
          <img src="../brand/logiwise-placeholder.svg" alt="LogiWise placeholder" class="brand-logiwise" width="38" height="38" />
          <div class="brand-text">
            <div class="brand-company">Kedrix</div>
            <div class="brand-product">LogiWise</div>
            <div class="brand-subtitle">Operational Logistics Platform</div>
          </div>
        </div>
        <button id="sidebarCloseBtn" class="icon-button mobile-only" type="button" aria-label="Chiudi menu">✕</button>
      </div>

      <nav class="nav-grid" aria-label="Moduli applicazione">
        <button class="nav-tab active" data-route="dashboard" type="button"><span class="nav-icon">◧</span><span>Dashboard</span></button>
        <button class="nav-tab" data-route="practices" type="button"><span class="nav-icon">▤</span><span>Pratiche</span></button>
        <button class="nav-tab" data-route="quotes" type="button"><span class="nav-icon">⎘</span><span>Quotazioni</span></button>
        <button class="nav-tab" data-route="warehouse" type="button"><span class="nav-icon">⌂</span><span>Magazzino</span></button>
        <button class="nav-tab" data-route="contacts" type="button"><span class="nav-icon">◎</span><span>Anagrafiche</span></button>
        <button class="nav-tab" data-route="documents" type="button"><span class="nav-icon">▥</span><span>Documenti</span></button>
        <button class="nav-tab" data-route="tracking" type="button"><span class="nav-icon">⌖</span><span>Tracking</span></button>
        <button class="nav-tab" data-route="reports" type="button"><span class="nav-icon">◫</span><span>Report</span></button>
        <button class="nav-tab" data-route="settings" type="button"><span class="nav-icon">⚙</span><span>Impostazioni</span></button>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-status">
          <span class="status-dot"></span>
          <span>Prototype v0 · Local backup ready</span>
        </div>
      </div>
    </aside>

    <div id="sidebarBackdrop" class="sidebar-backdrop" hidden></div>

    <div class="workspace">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebarOpenBtn" class="icon-button mobile-only" type="button" aria-label="Apri menu">☰</button>
          <div>
            <div class="eyebrow">Kedrix · Calm-tech workspace</div>
            <h1 id="pageTitle" class="page-title">Dashboard</h1>
          </div>
        </div>

        <div class="topbar-right">
          <div class="topbar-pills">
            <span class="soft-pill">Cross-platform</span>
            <span class="soft-pill">PWA</span>
            <span class="soft-pill">No OS popups</span>
          </div>
          <button id="quickAddBtn" class="primary-button" type="button">Nuova pratica</button>
        </div>
      </header>

      <main id="mainContent" class="main-content" tabindex="-1" aria-live="polite"></main>
    </div>
  </div>

  <section id="appToastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></section>

  <template id="emptyModuleTemplate">
    <section class="view-stack">
      <section class="hero-panel">
        <div class="hero-content">
          <span class="eyebrow">Module planned</span>
          <h2 class="hero-title">Modulo in roadmap</h2>
          <p class="hero-text">
            Questo modulo è predisposto a livello di navigazione, stile e architettura.
            In STEP 1 non viene implementata la logica operativa per mantenere il rilascio pulito,
            testabile e senza regressioni.
          </p>
          <div class="action-row">
            <button class="primary-button" type="button" data-action-route="dashboard">Torna alla dashboard</button>
            <button class="secondary-button" type="button" data-action-route="practices">Apri pratiche</button>
          </div>
        </div>
      </section>
    </section>
  </template>

  <script src="./app.js"></script>
</body>
</html>
